<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explorador de Código Python</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;600;800&display=swap');

        :root {
            --bg:       #1a1d23;
            --surface:  #21252b;
            --card:     #282c34;
            --border:   #3a404d;
            --accent:   #61afef;
            --green:    #98c379;
            --red:      #e06c75;
            --muted:    #5c6370;
            --text:     #abb2bf;
            --text-dim: #6b7280;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Syne', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 32px 20px;
        }

        .container {
            max-width: 960px;
            margin: 0 auto;
        }

        /* ── Header ── */
        header {
            display: flex;
            align-items: baseline;
            gap: 12px;
            margin-bottom: 28px;
        }
        header h1 {
            font-size: 1.9em;
            font-weight: 800;
            color: var(--accent);
            letter-spacing: -0.5px;
        }
        header span {
            font-size: 0.85em;
            color: var(--muted);
            font-weight: 400;
        }

        /* ── Search bar ── */
        .search-wrap {
            position: relative;
            margin-bottom: 28px;
        }
        .search-wrap svg {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            pointer-events: none;
        }
        #searchInput {
            width: 100%;
            padding: 13px 14px 13px 42px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.92em;
            outline: none;
            transition: border-color 0.2s;
        }
        #searchInput::placeholder { color: var(--muted); }
        #searchInput:focus { border-color: var(--accent); }

        /* ── Stats bar ── */
        #statsBar {
            font-size: 0.8em;
            color: var(--text-dim);
            margin-bottom: 18px;
            min-height: 18px;
        }
        #statsBar b { color: var(--accent); }

        /* ── Code list ── */
        .code-list {
            display: grid;
            gap: 16px;
        }

        .code-item {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
            transition: border-color 0.2s;
        }
        .code-item:hover { border-color: var(--accent); }

        /* ── Item header ── */
        .item-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 18px 12px;
            border-bottom: 1px solid var(--border);
            gap: 12px;
        }
        .fn-name {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1em;
            font-weight: 600;
            color: var(--green);
            word-break: break-all;
        }
        .fn-name .kw {
            color: var(--accent);
            font-weight: 400;
            margin-right: 4px;
        }
        .fn-args {
            font-size: 0.8em;
            color: var(--muted);
            font-weight: 400;
        }

        .copy-button {
            flex-shrink: 0;
            background: transparent;
            border: 1px solid var(--muted);
            color: var(--muted);
            padding: 5px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.78em;
            font-family: 'Syne', sans-serif;
            transition: all 0.15s;
            white-space: nowrap;
        }
        .copy-button:hover {
            border-color: var(--accent);
            color: var(--accent);
        }
        .copy-button.copied {
            border-color: var(--green);
            color: var(--green);
        }

        /* ── Code display ── */
        .code-display {
            background: var(--surface);
            padding: 16px 18px;
            overflow-x: auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.84em;
            line-height: 1.55;
            white-space: pre;
            max-height: 320px;
            color: #c8cdd5;
        }

        /* ── No results ── */
        .no-results {
            text-align: center;
            color: var(--red);
            padding: 50px 20px;
            font-size: 1.1em;
        }
        .no-results small { display: block; color: var(--muted); margin-top: 6px; font-size: 0.8em; }

        /* ── Error ── */
        .error-msg {
            background: rgba(224,108,117,0.1);
            border: 1px solid var(--red);
            border-radius: 8px;
            padding: 20px;
            color: var(--red);
            font-size: 0.9em;
            line-height: 1.6;
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>Python Explorer</h1>
        <span id="fnCount">cargando…</span>
    </header>

    <div class="search-wrap">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"
             viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="searchInput"
               placeholder="ej: global position  ·  establecer mesh  ·  getActive  ·  bsdf nodes">
    </div>

    <div id="statsBar"></div>
    <div class="code-list" id="codeList"></div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const codeListEl  = document.getElementById('codeList');
    const searchInput = document.getElementById('searchInput');
    const statsBar    = document.getElementById('statsBar');
    const fnCount     = document.getElementById('fnCount');

    let allFunctions = [];

    // ─────────────────────────────────────────────────────────────
    //  NORMALIZE  –  convierte snake_case y camelCase a palabras
    //  separadas por espacio, todo en minúsculas.
    //
    //  "establecer_mesh_activo" → "establecer mesh activo"
    //  "getGlobalPosition"      → "get global position"
    //  "BSDF_Nodes"             → "bsdf nodes"
    // ─────────────────────────────────────────────────────────────
    function normalize(str) {
        return str
            // 1) camelCase / PascalCase → insertar espacio antes de mayúscula
            //    que va después de minúscula, o antes de mayúscula seguida de minúscula
            .replace(/([a-z0-9])([A-Z])/g, '$1 $2')
            .replace(/([A-Z]+)([A-Z][a-z])/g, '$1 $2')
            // 2) guiones bajos, guiones, puntos → espacio
            .replace(/[_\-\.]+/g, ' ')
            // 3) todo a minúsculas y colapsar espacios múltiples
            .toLowerCase()
            .replace(/\s+/g, ' ')
            .trim();
    }

    // ─────────────────────────────────────────────────────────────
    //  PARSER  –  line-by-line, indentation-aware
    // ─────────────────────────────────────────────────────────────
    function parsePython(src) {
        const lines   = src.split('\n');
        const results = [];
        const total   = lines.length;
        let i = 0;

        const DEF_RE = /^(\s*)def\s+([a-zA-Z_][a-zA-Z0-9_]*)\s*(\([\s\S]*?\))\s*(?:->\s*.+?)?\s*:\s*(?:#.*)?$/;

        while (i < total) {
            const m = DEF_RE.exec(lines[i]);
            if (m) {
                const baseIndent = m[1].length;
                const funcName   = m[2];
                const funcArgs   = m[3];
                const start      = i;

                i++;

                while (i < total) {
                    const line    = lines[i];
                    const trimmed = line.trimEnd();

                    if (trimmed === '') { i++; continue; }

                    const lineIndent = line.length - line.trimStart().length;
                    if (lineIndent <= baseIndent) break;
                    i++;
                }

                let end = i;
                while (end > start + 1 && lines[end - 1].trim() === '') end--;

                const fullCode = lines.slice(start, end).join('\n');

                // searchIn: versión normalizada del nombre + args + código completo
                const raw      = funcName + ' ' + funcArgs + ' ' + fullCode;
                const searchIn = normalize(raw);

                results.push({ name: funcName, args: funcArgs, code: fullCode, searchIn });
            } else {
                i++;
            }
        }
        return results;
    }

    // ─────────────────────────────────────────────────────────────
    //  RENDER
    // ─────────────────────────────────────────────────────────────
    function render(list) {
        codeListEl.innerHTML = '';

        if (list.length === 0) {
            codeListEl.innerHTML = `
                <div class="no-results">
                    Sin resultados
                    <small>Prueba con otro término o comprueba la ortografía</small>
                </div>`;
            return;
        }

        const frag = document.createDocumentFragment();

        list.forEach(fn => {
            const item = document.createElement('div');
            item.className = 'code-item';

            const header = document.createElement('div');
            header.className = 'item-header';

            const nameEl = document.createElement('div');
            nameEl.className = 'fn-name';
            nameEl.innerHTML =
                `<span class="kw">def </span>${escHtml(fn.name)}`
                + `<span class="fn-args">${escHtml(fn.args)}</span>`;

            const btn = document.createElement('button');
            btn.className = 'copy-button';
            btn.textContent = 'Copiar';
            btn.onclick = () => copyCode(fn.code, btn);

            header.appendChild(nameEl);
            header.appendChild(btn);

            const pre = document.createElement('pre');
            pre.className = 'code-display';
            pre.textContent = fn.code;

            item.appendChild(header);
            item.appendChild(pre);
            frag.appendChild(item);
        });

        codeListEl.appendChild(frag);
    }

    // ─────────────────────────────────────────────────────────────
    //  FILTER  –  normaliza el input y busca todas las palabras
    // ─────────────────────────────────────────────────────────────
    function filter() {
        // Normalizar lo que escribe el usuario de la misma forma
        const normalized = normalize(searchInput.value);
        const tokens     = normalized.split(' ').filter(Boolean);

        const filtered = (tokens.length === 0
            ? allFunctions
            : allFunctions.filter(fn =>
                // cada token debe aparecer en el searchIn normalizado
                tokens.every(tok => fn.searchIn.includes(tok))
              )
        ).slice().sort((a, b) => a.name.localeCompare(b.name));

        render(filtered);

        if (tokens.length > 0) {
            statsBar.innerHTML =
                `Mostrando <b>${filtered.length}</b> de <b>${allFunctions.length}</b> funciones`;
        } else {
            statsBar.innerHTML = '';
        }
    }

    // ─────────────────────────────────────────────────────────────
    //  LOAD
    // ─────────────────────────────────────────────────────────────
    async function load() {
        try {
            const res = await fetch('./codigo.txt');
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const src = await res.text();
            allFunctions = parsePython(src);
            allFunctions.sort((a, b) => a.name.localeCompare(b.name));
            fnCount.textContent = `${allFunctions.length} funciones`;
            render(allFunctions);
        } catch (err) {
            fnCount.textContent = 'error';
            codeListEl.innerHTML = `
                <div class="error-msg">
                    <b>No se pudo cargar codigo.txt</b><br><br>
                    ${escHtml(err.message)}<br><br>
                    Asegúrate de colocar <code>codigo.txt</code> en la misma carpeta
                    que este HTML y abrirlo desde un servidor web (no con
                    <code>file://</code>).
                </div>`;
        }
    }

    // ─────────────────────────────────────────────────────────────
    //  HELPERS
    // ─────────────────────────────────────────────────────────────
    async function copyCode(code, btn) {
        try {
            await navigator.clipboard.writeText(code);
            btn.textContent = '✓ Copiado';
            btn.classList.add('copied');
            setTimeout(() => {
                btn.textContent = 'Copiar';
                btn.classList.remove('copied');
            }, 2000);
        } catch {
            alert('No se pudo copiar al portapapeles.');
        }
    }

    function escHtml(str) {
        return str
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    // ─────────────────────────────────────────────────────────────
    //  INIT
    // ─────────────────────────────────────────────────────────────
    load();
    searchInput.addEventListener('input', filter);
});
</script>
</body>
</html>
